spring.application.name=stayhub-identity-service
server.port=8080

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/identity_db}
spring.datasource.username=${DB_USERNAME:unset}
spring.datasource.password=${DB_PASSWORD:unset}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

jwt.secret=${JWT_SECRET:unset}
jwt.expiration=${JWT_EXPIRATION:3600000}
